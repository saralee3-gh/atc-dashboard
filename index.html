<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATC Workforce Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--surface3:#232840;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;--teal:#06b6d4;
  --text:#e2e8f0;--muted:#64748b;--font:"IBM Plex Sans Thai",sans-serif;--mono:"IBM Plex Mono",monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}

/* ── Top Navigation ── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;height:54px;gap:0;
}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:32px;}
.nav-brand .logo{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.nav-brand .title{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.2;}
.nav-brand .subtitle{font-size:10px;color:var(--muted);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.nav-tab{
  padding:8px 18px;border-radius:8px;border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;
  font-family:var(--font);transition:all 0.15s;display:flex;align-items:center;gap:7px;
}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-tab.active{color:#f1f5f9;background:rgba(59,130,246,0.15);}
.nav-tab .tab-icon{font-size:15px;}
.nav-right{display:flex;align-items:center;gap:8px;}
.update-badge{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);}

/* ── Pages ── */
.page{display:none;padding:20px 24px;min-height:calc(100vh - 54px);}
.page.active{display:block;}

/* ── Common Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.card-title-left{display:flex;align-items:center;gap:7px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── KPI Row ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.kpi-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.c-blue::before{background:var(--blue);}.kpi.c-amber::before{background:var(--amber);}
.kpi.c-green::before{background:var(--green);}.kpi.c-red::before{background:var(--red);}
.kpi.c-purple::before{background:var(--purple);}
.kpi-label{color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
.kpi-value{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;}
.kpi.c-blue .kpi-value{color:#93c5fd;}.kpi.c-amber .kpi-value{color:#fcd34d;}
.kpi.c-green .kpi-value{color:#6ee7b7;}.kpi.c-red .kpi-value{color:#fca5a5;}
.kpi.c-purple .kpi-value{color:#c4b5fd;}
.kpi-sub{color:var(--muted);font-size:10px;margin-top:4px;}

/* ── Grid layouts ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.grid-loc{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px;}
.full{grid-column:1/-1;}
.span2{grid-column:span 2;}

/* ── Insight box ── */
.insight-box{background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#c4b5fd;line-height:1.7;margin-bottom:16px;}
.insight-box strong{color:#ddd6fe;}
.warn-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#fca5a5;margin-top:12px;line-height:1.6;}
.note-box{background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#93c5fd;margin-top:12px;line-height:1.6;}
.alert{border-radius:7px;padding:7px 11px;font-size:11px;line-height:1.6;margin-bottom:10px;}
.alert-red{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.alert-amber{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);color:#fcd34d;}
.alert-green{background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;}

/* ── Location bar table ── */
.loc-table{width:100%;border-collapse:collapse;}
.loc-table tr{border-bottom:1px solid var(--border);}
.loc-table tr:last-child{border-bottom:none;}
.loc-table td{padding:5px 4px;vertical-align:middle;}
.loc-name{font-weight:500;color:var(--text);font-size:12px;width:90px;}
.loc-bar-wrap{position:relative;width:100%;height:13px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.loc-bar{height:100%;border-radius:2px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
.loc-divider td{padding:4px 4px 2px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;border-bottom:none!important;}

/* ── Projection ── */
.proj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.proj-year{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.proj-yr{color:var(--muted);font-size:11px;margin-bottom:5px;}
.proj-total{font-family:var(--mono);font-size:24px;font-weight:600;color:#f1f5f9;}
.proj-breakdown{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.proj-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.proj-item .lbl{color:var(--muted);}
.val-new{font-family:var(--mono);color:#fcd34d;}
.val-exp{font-family:var(--mono);color:#c4b5fd;}

/* ── Net table ── */
.net-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.net-tbl th{color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;padding:4px 6px;text-align:right;border-bottom:1px solid var(--border);}
.net-tbl th:first-child{text-align:left;}
.net-tbl td{padding:6px;text-align:right;border-bottom:1px solid var(--border2);font-family:var(--mono);font-size:11px;}
.net-tbl td:first-child{text-align:left;font-family:var(--font);}
.net-tbl tr:last-child td{border-bottom:none;}

/* ── Donut ── */
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;height:160px;}
.donut-center{position:absolute;text-align:center;pointer-events:none;}

/* ── Legend ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:1px;flex-shrink:0;}

/* ── Gap analysis ── */
.gap-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.gap-loc{width:82px;font-size:12px;font-weight:500;}

/* ── Location selector ── */
.loc-selector{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.loc-btn{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.loc-btn:hover{border-color:rgba(59,130,246,0.4);color:#93c5fd;}
.loc-btn.active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.5);color:#93c5fd;font-weight:500;}
.loc-btn.no-data{opacity:0.35;cursor:default;}

/* ── Staff tabs ── */
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border);}
.tab-btn{padding:7px 16px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);border-bottom:2px solid transparent;transition:all 0.15s;margin-bottom:-1px;border-radius:6px 6px 0 0;}
.tab-btn.active{color:#f1f5f9;background:rgba(59,130,246,0.12);border-bottom-color:var(--blue);font-weight:500;}
.tab-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.03);}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.filter-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;}
.filter-bar input:focus{border-color:rgba(59,130,246,0.5);}
.filter-bar input::placeholder{color:var(--muted);}
.filter-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;font-family:var(--font);outline:none;cursor:pointer;flex-shrink:0;}

/* ── Staff table ── */
.staff-list{overflow-y:auto;max-height:380px;}
.staff-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.staff-tbl th{position:sticky;top:0;background:var(--surface);color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);z-index:1;cursor:pointer;user-select:none;white-space:nowrap;}
.staff-tbl th:hover{color:var(--text);}
.staff-tbl th .sort-icon{margin-left:3px;opacity:0.5;}
.staff-tbl th.sorted .sort-icon{opacity:1;color:var(--blue);}
.staff-tbl td{padding:7px 8px;border-bottom:1px solid var(--border2);vertical-align:middle;}
.staff-tbl tr:hover td{background:rgba(255,255,255,0.02);}
.row-num{color:var(--muted);font-family:var(--mono);font-size:11px;width:28px;text-align:right;padding-right:12px!important;}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--muted);}
.retire-soon{color:#fca5a5;font-weight:500;}
.no-data-msg{text-align:center;color:var(--muted);padding:30px 0;font-size:12px;}
.divider{height:1px;background:var(--border);margin:8px 0;}

/* ── Pills ── */
.pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:500;}
.pill-blue{background:rgba(59,130,246,0.15);color:#93c5fd;}
.pill-amber{background:rgba(245,158,11,0.15);color:#fcd34d;}
.pill-green{background:rgba(16,185,129,0.15);color:#6ee7b7;}
.pill-red{background:rgba(239,68,68,0.15);color:#fca5a5;}
.pill-gray{background:rgba(100,116,139,0.15);color:#94a3b8;}
.pill-purple{background:rgba(167,139,250,0.15);color:#c4b5fd;}
.pill-teal{background:rgba(6,182,212,0.15);color:#67e8f9;}
.cat-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;}
.cat-new{background:rgba(245,158,11,0.15);color:#fcd34d;}
.cat-exp{background:rgba(167,139,250,0.15);color:#c4b5fd;}

/* ── Chart wraps ── */
.chart-wrap{position:relative;}

/* ── Course cards (Tab 3) ── */
.course-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s;}
.course-card:hover{border-color:rgba(59,130,246,0.4);}
.course-card.selected{border-color:var(--blue);background:rgba(59,130,246,0.04);}
.cc-code{font-size:11px;font-weight:600;color:#93c5fd;font-family:var(--mono);margin-bottom:4px;}
.cc-name{font-size:11px;color:#94a3b8;line-height:1.4;margin-bottom:10px;}
.cc-meta{display:flex;align-items:flex-end;justify-content:space-between;font-size:11px;}
.cc-count{font-family:var(--mono);font-weight:600;font-size:20px;color:#f1f5f9;}
.progress-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:8px;overflow:hidden;}
.progress-fill{height:3px;border-radius:2px;}
.gantt-timeline{position:relative;height:20px;min-width:200px;}
.bar-theory{position:absolute;height:8px;border-radius:2px;top:2px;background:rgba(59,130,246,0.7);}
.bar-ojt{position:absolute;height:8px;border-radius:2px;top:2px;background:rgba(16,185,129,0.65);}
.rating-dot{position:absolute;width:8px;height:8px;border-radius:50%;top:1px;background:#f59e0b;border:1.5px solid #0f1117;}
.detail-panel-wrap{display:grid;grid-template-columns:1fr 2fr;gap:12px;}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.dp-placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;}
.phase-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:2px;}
.phase-dates{font-size:12px;font-family:var(--mono);color:#e2e8f0;}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.status-item{background:var(--surface2);border-radius:6px;padding:8px;}
.status-num{font-size:18px;font-weight:600;font-family:var(--mono);}
.status-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
table.gantt{width:100%;border-collapse:collapse;font-size:11px;}
table.gantt th{color:var(--muted);font-size:10px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid var(--border);font-weight:500;}
table.gantt td{padding:5px 6px;border-bottom:1px solid var(--border2);vertical-align:middle;}
table.gantt tr:hover td{background:rgba(255,255,255,0.02);}
.gantt-name-cell{max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.gantt-count{font-family:var(--mono);text-align:right;color:#94a3b8;padding-right:8px!important;}
.gantt-rating-cell{font-family:var(--mono);font-size:10px;color:#fcd34d;text-align:right;}

@media(max-width:640px){
  .kpi-row,.kpi-row-4{grid-template-columns:repeat(2,1fr);}
  .grid-2,.grid-3,.grid-loc{grid-template-columns:1fr;}
  .span2,.full{grid-column:1;}
  .course-grid{grid-template-columns:1fr;}
  .detail-panel-wrap{grid-template-columns:1fr;}
  .proj-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<!-- ── TOP NAV ── -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="logo">✈</div>
    <div>
      <div class="title">ATC Workforce Dashboard</div>

    <button class="nav-tab" onclick="switchPage('course',this)">

    </button>
  </div>
  <div class="nav-right">
    <span class="update-badge" id="updateBadge">Loading...</span>
  </div>
</nav>

const YEARS_CE = [2026,2027,2028,2029,2030,2031,2032,2033,2034,2035];

function posTag(p) {
  const m = {'ผจก.':'pill-blue','ATC ๑':'pill-green','ATC ๒':'pill-gray','ATC ๓':'pill-teal'};
  return `<span class="pill ${m[p]||'pill-gray'}">${p}</span>`;
}
function statusTag(s) {
  if(!s||s==='-') return '';
  if(s==='Terminated'||s.includes('ลาออก')) return `<span class="pill pill-red">${s}</span>`;
  if(s.includes('รอการทดสอบ')||s.includes('พัก')) return `<span class="pill pill-amber">${s}</span>`;
  if(s.includes('รอหลักสูตร')) return `<span class="pill pill-purple">${s}</span>`;
  return `<span class="pill pill-gray">${s}</span>`;
}
function lvTag(lv) {
  return lv==='Lv.7'?'<span class="pill pill-amber">Lv.7 ส่วนกลาง</span>':'<span class="pill pill-green">Lv.5 ภูมิภาค</span>';
}
function sortData(data, col) {
  if(!col) return data;
  return [...data].sort((a,b) => {
    let va=a[col], vb=b[col];
    if(va===null||va===undefined) va = col==='rating'?9999:'ๆ';
    if(vb===null||vb===undefined) vb = col==='rating'?9999:'ๆ';
    if(typeof va==='number') return sortDir*(va-vb);
    return sortDir*String(va).localeCompare(String(vb),'th');
  });
}
function sortIcon(col) {
  if(sortCol!==col) return '<i class="sort-icon">↕</i>';
  return `<i class="sort-icon">${sortDir===1?'↑':'↓'}</i>`;
}
function onSort(col) {
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;}
  renderStaffList(DATA.locations.find(l=>l.id===currentLoc));
}
function computeNet(loc) {
  let rows=[],cur=loc.licensed;
  for(let i=0;i<YEARS_CE.length;i++) {
    const nc=loc.newCtrl[i]||0,ret=loc.retire[i]||0,net=nc-ret;
    rows.push({year:YEARS_CE[i],nc,ret,net,end:cur+net}); cur+=net;
  }
  return rows;
}
function destroyCharts() {
  activeCharts.forEach(c=>c.destroy());
  activeCharts=[];
}
function mkChart(id,cfg) {
  const c = new Chart(document.getElementById(id).getContext('2d'),cfg);
  activeCharts.push(c); return c;
}
function fmtDate(d) {
  if(!d) return '—';
  const dt=new Date(d);
  return dt.toLocaleDateString('th-TH',{year:'2-digit',month:'short',day:'numeric'});
}
function durMonths(s,e) {
  if(!s||!e) return '—';
  return Math.round((new Date(e)-new Date(s))/86400000/30.4)+' เดือน';
}

function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderOverview();
  if(id==='location') renderLocationPage();
  if(id==='course') renderCoursePage();
}

function renderLocationPage() {
  destroyCharts();

  const sel = document.getElementById('locSelector');
  if(sel.children.length===0) {
    DATA.locations.forEach(loc=>{
      const b=document.createElement('button');
      b.className='loc-btn'+(loc.noData?' no-data':'')+(loc.id===currentLoc?' active':'');
      b.textContent=loc.name; b.dataset.id=loc.id;
      if(!loc.noData) b.onclick=()=>selectLoc(loc.id);
      sel.appendChild(b);
    });
  }
  renderLoc(DATA.locations.find(l=>l.id===currentLoc));
}

function selectLoc(id) {
  currentLoc=id; searchVal=''; filterRet='all'; sortCol=''; sortDir=1; currentTab='licensed';
  document.querySelectorAll('.loc-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));

  renderLoc(DATA.locations.find(l=>l.id===id));
}

function updateFilterBar() {

function renderStaffList(loc) {
  const isLic=currentTab==='licensed';
  const raw=isLic?(DATA.staff_licensed[loc.id]||[]):(DATA.staff_students[loc.id]||[]);
  let data=raw.filter(r=>{
    const q=searchVal.toLowerCase();
    if(q&&!r.name.toLowerCase().includes(q)) return false;
    if(isLic) {
      const yr=r.ret;
      if(filterRet==='soon'&&!(yr<=2029)) return false;
      if(filterRet==='mid'&&!(yr>=2030&&yr<=2037)) return false;
      if(filterRet==='late'&&!(yr>2037)) return false;
    } else {
      const yr=r.rating;
      if(filterRet==='soon'&&!(yr&&yr<=2027)) return false;
      if(filterRet==='mid'&&!(yr&&yr>=2028&&yr<=2030)) return false;
      if(filterRet==='late'&&!(yr&&yr>2030)) return false;
      if(filterRet==='none'&&yr) return false;
    }
    return true;
  });
  data=sortData(data, sortCol||(isLic?'ret':'name'));
  const el=document.getElementById('staffListArea');
  if(!el) return;
  document.getElementById('countBadge').textContent=`${data.length} คน`;
  if(data.length===0) { el.innerHTML='<div class="no-data-msg">ไม่พบข้อมูล</div>'; return; }
  if(isLic) {
    el.innerHTML=`<div class="staff-list"><table class="staff-tbl">
      <thead><tr>
        <th class="row-num">#</th>
        <th class="${sortCol==='name'?'sorted':''}" onclick="onSort('name')">ชื่อ-นามสกุล <i class="sort-icon">${sortCol==='name'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='pos'?'sorted':''}" onclick="onSort('pos')">ตำแหน่ง <i class="sort-icon">${sortCol==='pos'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='ret'?'sorted':''}" onclick="onSort('ret')" style="text-align:right">เกษียณ (ค.ศ.) <i class="sort-icon">${sortCol==='ret'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
      </tr></thead>
      <tbody>${data.map((r,i)=>`<tr><td class="row-num">${i+1}</td><td style="color:#e2e8f0">${r.name}</td><td>${posTag(r.pos)}</td><td class="${r.ret<=2029?'retire-soon':''}" style="font-family:var(--mono);font-size:11px;text-align:right">${r.ret}</td></tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    el.innerHTML=`<div class="staff-list"><table class="staff-tbl">
      <thead><tr>
        <th class="row-num">#</th>
        <th class="${sortCol==='name'?'sorted':''}" onclick="onSort('name')">ชื่อ-นามสกุล <i class="sort-icon">${sortCol==='name'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th>ระดับ</th>
        <th class="${sortCol==='course'?'sorted':''}" onclick="onSort('course')">หลักสูตร <i class="sort-icon">${sortCol==='course'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='rating'?'sorted':''}" onclick="onSort('rating')" style="text-align:right">คาดได้ Rating (ค.ศ.) <i class="sort-icon">${sortCol==='rating'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='status'?'sorted':''}" onclick="onSort('status')">สถานะ <i class="sort-icon">${sortCol==='status'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
      </tr></thead>
      <tbody>${data.map((r,i)=>`<tr><td class="row-num">${i+1}</td><td style="color:#e2e8f0">${r.name}</td><td>${lvTag(r.lv)}</td><td style="font-size:11px;color:#94a3b8;">${r.course||'—'}</td><td style="font-family:var(--mono);font-size:11px;color:${r.rating?'#6ee7b7':'#64748b'};text-align:right">${r.rating||'—'}</td><td>${statusTag(r.status)}</td></tr>`).join('')}</tbody>

function switchTab(tab) {
  currentTab=tab; sortCol=''; sortDir=1; searchVal=''; filterRet='all';

const GANTT_START=new Date('2024-01-01'), GANTT_END=new Date('2030-01-01');
const TOTAL_DAYS=(GANTT_END-GANTT_START)/86400000;
function dayOffset(d){return d?Math.max(0,(new Date(d)-GANTT_START)/86400000/TOTAL_DAYS*100):null;}
function dayWidth(s,e){return(s&&e)?Math.max(0.5,(new Date(e)-new Date(s))/86400000/TOTAL_DAYS*100):0;}
function progressColor(p){return p>=80?'#10b981':p>=40?'#3b82f6':'#f59e0b';}

        <div class="status-item"><div class="status-num" style="color:#93c5fd">${c.count}</div><div class="status-lbl">นักเรียนทั้งหมด</div></div>
        <div class="status-item"><div class="status-num" style="color:#fcd34d">${c.progress}%</div><div class="status-lbl">OJT Progress</div></div>
        <div class="status-item"><div class="status-num" style="color:#fca5a5">${specCount}</div><div class="status-lbl">สถานะพิเศษ</div></div>
        <div class="status-item"><div class="status-num" style="color:#6ee7b7">${c.count-specCount}</div><div class="status-lbl">ปกติ</div></div>
      </div>
    </div>
    <div class="detail-panel">
      <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;">รายชื่อนักเรียน (${c.sangkad})</div>
      <div class="staff-list">
        <table class="staff-tbl">
          <thead><tr><th>#</th><th>ชื่อ-นามสกุล</th><th>ระดับ</th><th>คาดได้ Rating (ค.ศ.)</th><th>สถานะ</th></tr></thead>
          <tbody>
            ${stuData.map((s,i)=>`<tr>
              <td style="color:var(--muted);font-family:var(--mono);font-size:11px;">${i+1}</td>
              <td style="color:#e2e8f0">${s.name}</td>
              <td>${lvTag(s.lv)}</td>
              <td style="font-family:var(--mono);font-size:11px;color:${s.rating?'#6ee7b7':'#64748b'}">${s.rating||'—'}</td>
              <td>${statusTag(s.status)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

document.getElementById('updateBadge').textContent = 'ข้อมูล: ' + DATA.updated;
renderOverview();
</script>
</body>
