<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATC Workforce Dashboard</title>
<script>/* Chart.js CDN replaced with inline offline shim */
/* Minimal dependency-free Chart.js-compatible shim (doughnut/bar/line) */
(function(){
  function num(v){return typeof v==='number'&&isFinite(v);}
  function niceMax(v){if(v<=0)return 10;var e=Math.pow(10,Math.floor(Math.log10(v)));var f=v/e;var n=f<=1?1:f<=2?2:f<=5?5:10;return n*e;}
  function color(c,i,def){if(Array.isArray(c))return c[i]||def;return c||def;}
  function Chart(ctx,cfg){
    this.ctx=ctx;this.cfg=cfg;this.canvas=ctx.canvas;this._raf=null;
    var self=this;this._draw();
    this._ro=null;
    if(cfg.options&&cfg.options.responsive!==false&&window.ResizeObserver){
      this._ro=new ResizeObserver(function(){self._draw();});
      try{this._ro.observe(this.canvas.parentElement||this.canvas);}catch(e){}
    }
  }
  Chart.prototype.destroy=function(){if(this._ro){try{this._ro.disconnect();}catch(e){}}var c=this.canvas;var g=c.getContext('2d');g.setTransform(1,0,0,1,0,0);g.clearRect(0,0,c.width,c.height);};
  Chart.prototype._draw=function(){
    var cfg=this.cfg,cv=this.canvas,opt=cfg.options||{},resp=opt.responsive!==false;
    var dpr=window.devicePixelRatio||1;
    var cssW,cssH;
    if(resp){var p=cv.parentElement;cssW=cv.clientWidth||(p&&p.clientWidth)||300;cssH=cv.clientHeight||(p&&p.clientHeight)||200;}
    else{cssW=cv.width;cssH=cv.height;}
    if(cssH<20)cssH=200;if(cssW<20)cssW=300;
    cv.width=Math.round(cssW*dpr);cv.height=Math.round(cssH*dpr);
    if(resp){cv.style.width=cssW+'px';cv.style.height=cssH+'px';}
    var g=cv.getContext('2d');g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,cssW,cssH);
    var W=cssW,H=cssH,t=cfg.type;
    if(t==='doughnut')this._doughnut(g,W,H);
    else if(t==='line')this._line(g,W,H);
    else this._bar(g,W,H);
  };
  Chart.prototype._doughnut=function(g,W,H){
    var ds=this.cfg.data.datasets[0],data=ds.data.map(Number),tot=data.reduce(function(a,b){return a+(num(b)?b:0);},0)||1;
    var cutS=(this.cfg.options&&this.cfg.options.cutout)||'0%';var cf=parseFloat(cutS)/100;if(!isFinite(cf))cf=0;
    var cx=W/2,cy=H/2,R=Math.min(W,H)/2*0.92,r=R*cf;
    var a0=-Math.PI/2;var bc=ds.backgroundColor,bd=ds.borderColor,bw=ds.borderWidth||0;
    for(var i=0;i<data.length;i++){
      var frac=(num(data[i])?data[i]:0)/tot,a1=a0+frac*Math.PI*2;
      g.beginPath();g.moveTo(cx+Math.cos(a0)*r,cy+Math.sin(a0)*r);
      g.arc(cx,cy,R,a0,a1);g.arc(cx,cy,r,a1,a0,true);g.closePath();
      g.fillStyle=color(bc,i,'#3b82f6');g.fill();
      if(bw){g.lineWidth=bw;g.strokeStyle=color(bd,i,'#1e2335');g.stroke();}
      a0=a1;
    }
  };
  Chart.prototype._axesBox=function(g,W,H,opt){
    var padL=38,padR=(opt.scales&&opt.scales.y2)?40:12,padT=10,padB=26;
    return {x0:padL,x1:W-padR,y0:padT,y1:H-padB,w:W-padL-padR,h:H-padT-padB};
  };
  Chart.prototype._yticks=function(g,box,min,max,x,align,col){
    g.fillStyle=col||'#64748b';g.font='10px sans-serif';g.textAlign=align||'right';g.textBaseline='middle';
    var steps=4;for(var i=0;i<=steps;i++){var v=min+(max-min)*i/steps;var y=box.y1-(box.y1-box.y0)*i/steps;
      g.strokeStyle='rgba(255,255,255,0.05)';g.beginPath();g.moveTo(box.x0,y);g.lineTo(box.x1,y);g.stroke();
      g.fillText(Math.round(v),x,y);}
  };
  Chart.prototype._xlabels=function(g,box,labels,col){
    g.fillStyle=col||'#64748b';g.font='10px sans-serif';g.textAlign='center';g.textBaseline='top';
    var n=labels.length;for(var i=0;i<n;i++){var x=box.x0+box.w*(n===1?0.5:(i+0.5)/n);g.fillText(labels[i],x,box.y1+6);}
  };
  Chart.prototype._bar=function(g,W,H){
    var cfg=this.cfg,opt=cfg.options||{},labels=cfg.data.labels,dsets=cfg.data.datasets;
    var stacked=!!(opt.scales&&opt.scales.x&&opt.scales.x.stacked);
    var n=labels.length;var box=this._axesBox(g,W,H,opt);
    var max=0;
    if(stacked){for(var i=0;i<n;i++){var s=0;dsets.forEach(function(d){s+=Number(d.data[i])||0;});if(s>max)max=s;}}
    else{dsets.forEach(function(d){d.data.forEach(function(v){v=Number(v)||0;if(v>max)max=v;});});}
    max=niceMax(max);var min=0;
    var yc=(opt.scales&&opt.scales.y&&opt.scales.y.ticks&&opt.scales.y.ticks.color)||'#64748b';
    this._yticks(g,box,min,max,box.x0-6,'right',yc);
    var groupW=box.w/n,inner=groupW*0.7,x;
    for(var i=0;i<n;i++){
      var gx=box.x0+groupW*i+(groupW-inner)/2;
      if(stacked){
        var acc=0;
        for(var k=0;k<dsets.length;k++){var v=Number(dsets[k].data[i])||0;var bh=(v/max)*box.h;
          var y=box.y1-((acc+v)/max)*box.h;g.fillStyle=color(dsets[k].backgroundColor,i,'#f59e0b');
          this._rr(g,gx,y,inner,bh,3);g.fill();acc+=v;}
      }else{
        var bw2=inner/dsets.length;
        for(var k=0;k<dsets.length;k++){var v=Number(dsets[k].data[i])||0;var bh=(v/max)*box.h;
          var y=box.y1-bh;g.fillStyle=color(dsets[k].backgroundColor,i,'#3b82f6');
          this._rr(g,gx+bw2*k,y,bw2*0.86,bh,3);g.fill();}
      }
    }
    this._xlabels(g,box,labels.map(String));
    this._legend(g,W,box,dsets,opt);
  };
  Chart.prototype._rr=function(g,x,y,w,h,r){if(h<0){y+=h;h=-h;}r=Math.min(r,w/2,h);g.beginPath();
    g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,0);g.arcTo(x,y+h,x,y,0);g.arcTo(x,y,x+w,y,r);g.closePath();};
  Chart.prototype._legend=function(g,W,box,dsets,opt){
    if(!(opt.plugins&&opt.plugins.legend&&opt.plugins.legend.display))return;
    g.font='11px sans-serif';g.textBaseline='middle';g.textAlign='left';
    var lx=box.x0,ly=6;
    for(var i=0;i<dsets.length;i++){var lab=dsets[i].label||'';var col=(Array.isArray(dsets[i].backgroundColor)?dsets[i].borderColor:dsets[i].backgroundColor)||dsets[i].borderColor||'#888';
      g.fillStyle=col;g.fillRect(lx,ly-4,9,9);g.fillStyle='#64748b';g.fillText(lab,lx+13,ly);lx+=13+g.measureText(lab).width+16;}
  };
  Chart.prototype._line=function(g,W,H){
    var cfg=this.cfg,opt=cfg.options||{},labels=cfg.data.labels,dsets=cfg.data.datasets;
    var n=labels.length;var box=this._axesBox(g,W,H,opt);
    var sc=opt.scales||{};
    function axisRange(id){
      var vals=[];dsets.forEach(function(d){if((d.yAxisID||'y')===id)d.data.forEach(function(v){if(num(Number(v)))vals.push(Number(v));});});
      if(!vals.length)vals=[0,1];var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
      var s=sc[id]||{};if(s.beginAtZero)mn=0;if(typeof s.min==='number')mn=s.min;
      if(mx===mn)mx=mn+1;var pad=(mx-mn)*0.08;return{min:mn-(s.beginAtZero||typeof s.min==='number'?0:pad),max:niceMax(mx+pad)};
    }
    var ry=axisRange('y'),ry2=sc.y2?axisRange('y2'):null;
    var yc=(sc.y&&sc.y.ticks&&sc.y.ticks.color)||'#93c5fd';
    this._yticks(g,box,ry.min,ry.max,box.x0-6,'right',yc);
    if(ry2){g.fillStyle=(sc.y2.ticks&&sc.y2.ticks.color)||'#64748b';g.font='10px sans-serif';g.textAlign='left';g.textBaseline='middle';
      for(var i=0;i<=4;i++){var v=ry2.min+(ry2.max-ry2.min)*i/4;var y=box.y1-(box.y1-box.y0)*i/4;g.fillText(Math.round(v),box.x1+6,y);}}
    function X(i){return box.x0+box.w*(n===1?0.5:i/(n-1));}
    dsets.forEach(function(d){
      var rng=(d.yAxisID==='y2'&&ry2)?ry2:ry;
      function Y(v){v=Number(v);return box.y1-(v-rng.min)/(rng.max-rng.min)*box.h;}
      var pts=d.data.map(function(v,i){return[X(i),Y(v)];});
      // fill
      if(d.fill){g.beginPath();g.moveTo(pts[0][0],box.y1);pts.forEach(function(p){g.lineTo(p[0],p[1]);});g.lineTo(pts[pts.length-1][0],box.y1);g.closePath();
        g.fillStyle=d.backgroundColor||'rgba(59,130,246,0.07)';g.fill();}
      // line
      g.beginPath();g.lineWidth=d.borderWidth||2;g.strokeStyle=d.borderColor||'#3b82f6';
      g.setLineDash(d.borderDash||[]);
      var tension=d.tension||0;
      for(var i=0;i<pts.length;i++){if(i===0)g.moveTo(pts[i][0],pts[i][1]);
        else if(tension>0){var p0=pts[i-1],p1=pts[i];var mx=(p0[0]+p1[0])/2;g.bezierCurveTo(mx,p0[1],mx,p1[1],p1[0],p1[1]);}
        else g.lineTo(pts[i][0],pts[i][1]);}
      g.stroke();g.setLineDash([]);
      // points
      var pr=d.pointRadius||0;if(pr>0){g.fillStyle=d.pointBackgroundColor||d.borderColor||'#3b82f6';
        pts.forEach(function(p){g.beginPath();g.arc(p[0],p[1],pr,0,Math.PI*2);g.fill();});}
    });
    this._xlabels(g,box,labels.map(String));
  };
  Chart.register=function(){};Chart.defaults={};
  window.Chart=Chart;
})();

</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--surface3:#232840;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;--teal:#06b6d4;
  --text:#e2e8f0;--muted:#64748b;--font:"IBM Plex Sans Thai",sans-serif;--mono:"IBM Plex Mono",monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}

/* ── Top Navigation ── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;height:54px;gap:0;
}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:32px;}
.nav-brand .logo{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.nav-brand .title{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.2;}
.nav-brand .subtitle{font-size:10px;color:var(--muted);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.nav-tab{
  padding:8px 18px;border-radius:8px;border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;
  font-family:var(--font);transition:all 0.15s;display:flex;align-items:center;gap:7px;
}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-tab.active{color:#f1f5f9;background:rgba(59,130,246,0.15);}
.nav-tab .tab-icon{font-size:15px;}
.nav-right{display:flex;align-items:center;gap:8px;}
.update-badge{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);}

/* ── Pages ── */
.page{display:none;padding:20px 24px;min-height:calc(100vh - 54px);}
.page.active{display:block;}

/* ── Common Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.card-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.card-title-left{display:flex;align-items:center;gap:7px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ── KPI Row ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.kpi-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.c-blue::before{background:var(--blue);}.kpi.c-amber::before{background:var(--amber);}
.kpi.c-green::before{background:var(--green);}.kpi.c-red::before{background:var(--red);}
.kpi.c-purple::before{background:var(--purple);}
.kpi-label{color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
.kpi-value{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;}
.kpi.c-blue .kpi-value{color:#93c5fd;}.kpi.c-amber .kpi-value{color:#fcd34d;}
.kpi.c-green .kpi-value{color:#6ee7b7;}.kpi.c-red .kpi-value{color:#fca5a5;}
.kpi.c-purple .kpi-value{color:#c4b5fd;}
.kpi-sub{color:var(--muted);font-size:10px;margin-top:4px;}

/* ── Grid layouts ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.grid-loc{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px;}
.full{grid-column:1/-1;}
.span2{grid-column:span 2;}

/* ── Insight box ── */
.insight-box{background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#c4b5fd;line-height:1.7;margin-bottom:16px;}
.insight-box strong{color:#ddd6fe;}
.warn-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#fca5a5;margin-top:12px;line-height:1.6;}
.note-box{background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:#93c5fd;margin-top:12px;line-height:1.6;}
.alert{border-radius:7px;padding:7px 11px;font-size:11px;line-height:1.6;margin-bottom:10px;}
.alert-red{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.alert-amber{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);color:#fcd34d;}
.alert-green{background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;}

/* ── Location bar table ── */
.loc-table{width:100%;border-collapse:collapse;}
.loc-table tr{border-bottom:1px solid var(--border);}
.loc-table tr:last-child{border-bottom:none;}
.loc-table td{padding:5px 4px;vertical-align:middle;}
.loc-name{font-weight:500;color:var(--text);font-size:12px;width:90px;}
.loc-bar-wrap{position:relative;width:100%;height:13px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.loc-bar{height:100%;border-radius:2px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
.loc-divider td{padding:4px 4px 2px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;border-bottom:none!important;}

/* ── Projection ── */
.proj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.proj-year{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.proj-yr{color:var(--muted);font-size:11px;margin-bottom:5px;}
.proj-total{font-family:var(--mono);font-size:24px;font-weight:600;color:#f1f5f9;}
.proj-breakdown{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.proj-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.proj-item .lbl{color:var(--muted);}
.val-new{font-family:var(--mono);color:#fcd34d;}
.val-exp{font-family:var(--mono);color:#c4b5fd;}

/* ── Net table ── */
.net-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.net-tbl th{color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;padding:4px 6px;text-align:right;border-bottom:1px solid var(--border);}
.net-tbl th:first-child{text-align:left;}
.net-tbl td{padding:6px;text-align:right;border-bottom:1px solid var(--border2);font-family:var(--mono);font-size:11px;}
.net-tbl td:first-child{text-align:left;font-family:var(--font);}
.net-tbl tr:last-child td{border-bottom:none;}

/* ── Donut ── */
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;height:160px;}
.donut-center{position:absolute;text-align:center;pointer-events:none;}

/* ── Legend ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:1px;flex-shrink:0;}

/* ── Gap analysis ── */
.gap-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.gap-loc{width:82px;font-size:12px;font-weight:500;}

/* ── Location selector ── */
.loc-selector{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.loc-btn{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.loc-btn:hover{border-color:rgba(59,130,246,0.4);color:#93c5fd;}
.loc-btn.active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.5);color:#93c5fd;font-weight:500;}
.loc-btn.no-data{opacity:0.35;cursor:default;}

/* ── Staff tabs ── */
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border);}
.tab-btn{padding:7px 16px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);border-bottom:2px solid transparent;transition:all 0.15s;margin-bottom:-1px;border-radius:6px 6px 0 0;}
.tab-btn.active{color:#f1f5f9;background:rgba(59,130,246,0.12);border-bottom-color:var(--blue);font-weight:500;}
.tab-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.03);}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.filter-bar input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;}
.filter-bar input:focus{border-color:rgba(59,130,246,0.5);}
.filter-bar input::placeholder{color:var(--muted);}
.filter-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;font-family:var(--font);outline:none;cursor:pointer;flex-shrink:0;}

/* ── Staff table ── */
.staff-list{overflow-y:auto;max-height:380px;}
.staff-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.staff-tbl th{position:sticky;top:0;background:var(--surface);color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);z-index:1;cursor:pointer;user-select:none;white-space:nowrap;}
.staff-tbl th:hover{color:var(--text);}
.staff-tbl th .sort-icon{margin-left:3px;opacity:0.5;}
.staff-tbl th.sorted .sort-icon{opacity:1;color:var(--blue);}
.staff-tbl td{padding:7px 8px;border-bottom:1px solid var(--border2);vertical-align:middle;}
.staff-tbl tr:hover td{background:rgba(255,255,255,0.02);}
.row-num{color:var(--muted);font-family:var(--mono);font-size:11px;width:28px;text-align:right;padding-right:12px!important;}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--muted);}
.retire-soon{color:#fca5a5;font-weight:500;}
.no-data-msg{text-align:center;color:var(--muted);padding:30px 0;font-size:12px;}
.divider{height:1px;background:var(--border);margin:8px 0;}

/* ── Pills ── */
.pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:500;}
.pill-blue{background:rgba(59,130,246,0.15);color:#93c5fd;}
.pill-amber{background:rgba(245,158,11,0.15);color:#fcd34d;}
.pill-green{background:rgba(16,185,129,0.15);color:#6ee7b7;}
.pill-red{background:rgba(239,68,68,0.15);color:#fca5a5;}
.pill-gray{background:rgba(100,116,139,0.15);color:#94a3b8;}
.pill-purple{background:rgba(167,139,250,0.15);color:#c4b5fd;}
.pill-teal{background:rgba(6,182,212,0.15);color:#67e8f9;}
.cat-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;}
.cat-new{background:rgba(245,158,11,0.15);color:#fcd34d;}
.cat-exp{background:rgba(167,139,250,0.15);color:#c4b5fd;}

/* ── Chart wraps ── */
.chart-wrap{position:relative;}

/* ── Course cards (Tab 3) ── */
.course-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.2s;}
.course-card:hover{border-color:rgba(59,130,246,0.4);}
.course-card.selected{border-color:var(--blue);background:rgba(59,130,246,0.04);}
.cc-code{font-size:11px;font-weight:600;color:#93c5fd;font-family:var(--mono);margin-bottom:4px;}
.cc-name{font-size:11px;color:#94a3b8;line-height:1.4;margin-bottom:10px;}
.cc-meta{display:flex;align-items:flex-end;justify-content:space-between;font-size:11px;}
.cc-count{font-family:var(--mono);font-weight:600;font-size:20px;color:#f1f5f9;}
.progress-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:8px;overflow:hidden;}
.progress-fill{height:3px;border-radius:2px;}
.gantt-timeline{position:relative;height:20px;min-width:200px;}
.bar-theory{position:absolute;height:8px;border-radius:2px;top:2px;background:rgba(59,130,246,0.7);}
.bar-ojt{position:absolute;height:8px;border-radius:2px;top:2px;background:rgba(16,185,129,0.65);}
.rating-dot{position:absolute;width:8px;height:8px;border-radius:50%;top:1px;background:#f59e0b;border:1.5px solid #0f1117;}
.detail-panel-wrap{display:grid;grid-template-columns:1fr 2fr;gap:12px;}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.dp-placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;}
.phase-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:2px;}
.phase-dates{font-size:12px;font-family:var(--mono);color:#e2e8f0;}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.status-item{background:var(--surface2);border-radius:6px;padding:8px;}
.status-num{font-size:18px;font-weight:600;font-family:var(--mono);}
.status-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
table.gantt{width:100%;border-collapse:collapse;font-size:11px;}
table.gantt th{color:var(--muted);font-size:10px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid var(--border);font-weight:500;}
table.gantt td{padding:5px 6px;border-bottom:1px solid var(--border2);vertical-align:middle;}
table.gantt tr:hover td{background:rgba(255,255,255,0.02);}
.gantt-name-cell{max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.gantt-count{font-family:var(--mono);text-align:right;color:#94a3b8;padding-right:8px!important;}
.gantt-rating-cell{font-family:var(--mono);font-size:10px;color:#fcd34d;text-align:right;}

@media(max-width:640px){
  .kpi-row,.kpi-row-4{grid-template-columns:repeat(2,1fr);}
  .grid-2,.grid-3,.grid-loc{grid-template-columns:1fr;}
  .span2,.full{grid-column:1;}
  .course-grid{grid-template-columns:1fr;}
  .detail-panel-wrap{grid-template-columns:1fr;}
  .proj-grid{grid-template-columns:repeat(2,1fr);}
}
</style>

const YEARS_CE = [2026,2027,2028,2029,2030,2031,2032,2033,2034,2035];

// posTag: use EN abbr from ATCO_POSITION, color by level
function posTag(p, level) {
  if (!p) return '<span class="pill pill-gray">—</span>';
  const lv = level || 10;
  // Level 10 = ATC Manager
  if (lv === 10) return `<span class="pill pill-blue">${p}</span>`;
  // Level 9 = ATC 2/3 + Asst Mgr
  if (lv === 9) {
    if (p.includes('Asst')) return `<span class="pill pill-purple">${p}</span>`;
    if (p.includes('3'))    return `<span class="pill pill-teal">${p}</span>`;
    return `<span class="pill pill-gray">${p}</span>`;
  }
  // Level 8 = ATC 1 (BKK)
  if (lv === 8) return `<span class="pill pill-green">${p}</span>`;
  // Level 7 = ATC 2 (Prov ARD) — licensed but lower rating
  if (lv === 7) return `<span class="pill pill-amber">${p}</span>`;
  // Level 6 = ATC 1 (Prov ARD)
  if (lv === 6) return `<span class="pill" style="background:rgba(6,182,212,0.15);color:#67e8f9">${p}</span>`;
  return `<span class="pill pill-gray">${p}</span>`;
}

// Level badge for Licensed Controller table
function levelBadge(lv) {
  const colors = {
    6:  {bg:'rgba(6,182,212,0.15)',   color:'#67e8f9'},
    7:  {bg:'rgba(245,158,11,0.15)',  color:'#fcd34d'},
    8:  {bg:'rgba(16,185,129,0.15)',  color:'#6ee7b7'},
    9:  {bg:'rgba(100,116,139,0.15)', color:'#94a3b8'},
    10: {bg:'rgba(59,130,246,0.15)',  color:'#93c5fd'},
  };
  const c = colors[lv] || colors[10];
  return `<span style="display:inline-block;background:${c.bg};color:${c.color};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;font-family:var(--mono)">Lv.${lv}</span>`;
}
function statusTag(s) {
  if(!s||s==='-') return '';
  if(s==='Terminated'||s.includes('ลาออก')) return `<span class="pill pill-red">${s}</span>`;
  if(s.includes('รอการทดสอบ')||s.includes('พัก')) return `<span class="pill pill-amber">${s}</span>`;
  if(s.includes('รอหลักสูตร')) return `<span class="pill pill-purple">${s}</span>`;
  return `<span class="pill pill-gray">${s}</span>`;
}

function lvTag(lv) {
  return lv==='Lv.7'
    ? '<span class="pill pill-amber">Lv.7 · ATC Trainee</span>'
    : '<span class="pill pill-green">Lv.5 · ATC Student</span>';
}
function sortData(data, col) {
  if(!col) return data;
  return [...data].sort((a,b) => {
    let va=a[col], vb=b[col];
    if(va===null||va===undefined) va = col==='rating'?9999:'ๆ';
    if(vb===null||vb===undefined) vb = col==='rating'?9999:'ๆ';
    if(typeof va==='number') return sortDir*(va-vb);
    return sortDir*String(va).localeCompare(String(vb),'th');
  });
}
function sortIcon(col) {
  if(sortCol!==col) return '<i class="sort-icon">↕</i>';
  return `<i class="sort-icon">${sortDir===1?'↑':'↓'}</i>`;
}
function onSort(col) {
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;}
  renderStaffList(DATA.locations.find(l=>l.id===currentLoc));
}
function computeNet(loc) {
  let rows=[],cur=loc.licensed;
  for(let i=0;i<YEARS_CE.length;i++) {
    const nc=loc.newCtrl[i]||0,ret=loc.retire[i]||0,net=nc-ret;
    rows.push({year:YEARS_CE[i],nc,ret,net,end:cur+net}); cur+=net;
  }
  return rows;
}
function destroyCharts() {
  activeCharts.forEach(c=>c.destroy());
  activeCharts=[];
}
function mkChart(id,cfg) {
  const c = new Chart(document.getElementById(id).getContext('2d'),cfg);
  activeCharts.push(c); return c;
}
function fmtDate(d) {
  if(!d) return '—';
  const dt=new Date(d);
  return dt.toLocaleDateString('th-TH',{year:'2-digit',month:'short',day:'numeric'});
}
function durMonths(s,e) {
  if(!s||!e) return '—';
  return Math.round((new Date(e)-new Date(s))/86400000/30.4)+' เดือน';
}

function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='overview') renderOverview();
  if(id==='location') renderLocationPage();
  if(id==='course') renderCoursePage();
}

function renderLocationPage() {
  destroyCharts();

  const sel = document.getElementById('locSelector');
  if(sel.children.length===0) {
    DATA.locations.forEach(loc=>{
      const b=document.createElement('button');
      b.className='loc-btn'+(loc.noData?' no-data':'')+(loc.id===currentLoc?' active':'');
      b.textContent=loc.name; b.dataset.id=loc.id;
      if(!loc.noData) b.onclick=()=>selectLoc(loc.id);
      sel.appendChild(b);
    });
  }
  renderLoc(DATA.locations.find(l=>l.id===currentLoc));
}

function selectLoc(id) {
  currentLoc=id; searchVal=''; filterRet='all'; sortCol=''; sortDir=1; currentTab='licensed';
  document.querySelectorAll('.loc-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  destroyCharts();
  renderLoc(DATA.locations.find(l=>l.id===id));
}

function updateFilterBar() {
  const isLic=currentTab==='licensed';
  const el=document.getElementById('filterRet');
  if(!el) return;
  el.innerHTML = isLic
    ? '<option value="all">ทุกปีเกษียณ</option><option value="soon">เกษียณ ≤ 2029</option><option value="mid">2030–2037</option><option value="late">> 2037</option>'
    : '<option value="all">ทุกสถานะ Rating</option><option value="soon">ได้ Rating ≤ 2027</option><option value="mid">2028–2030</option><option value="late">> 2030</option><option value="none">ยังไม่มีวันคาดการณ์</option>';
  el.value=filterRet;
}

function renderStaffList(loc) {
  const isLic=currentTab==='licensed';
  const raw=isLic?(DATA.staff_licensed[loc.id]||[]):(DATA.staff_students[loc.id]||[]);
  let data=raw.filter(r=>{
    const q=searchVal.toLowerCase();
    if(q&&!r.name.toLowerCase().includes(q)) return false;
    if(isLic) {
      const yr=r.ret;
      if(filterRet==='soon'&&!(yr<=2029)) return false;
      if(filterRet==='mid'&&!(yr>=2030&&yr<=2037)) return false;
      if(filterRet==='late'&&!(yr>2037)) return false;
    } else {
      const yr=r.rating;
      if(filterRet==='soon'&&!(yr&&yr<=2027)) return false;
      if(filterRet==='mid'&&!(yr&&yr>=2028&&yr<=2030)) return false;
      if(filterRet==='late'&&!(yr&&yr>2030)) return false;
      if(filterRet==='none'&&yr) return false;
    }
    return true;
  });
  data=sortData(data, sortCol||(isLic?'ret':'name'));
  const el=document.getElementById('staffListArea');
  if(!el) return;
  document.getElementById('countBadge').textContent=`${data.length} คน`;
  if(data.length===0) { el.innerHTML='<div class="no-data-msg">ไม่พบข้อมูล</div>'; return; }
  if(isLic) {
    el.innerHTML=`<div class="staff-list"><table class="staff-tbl">
      <thead><tr>
        <th class="row-num">#</th>
        <th class="${sortCol==='name'?'sorted':''}" onclick="onSort('name')">ชื่อ-นามสกุล <i class="sort-icon">${sortCol==='name'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='pos'?'sorted':''}" onclick="onSort('pos')">ตำแหน่ง <i class="sort-icon">${sortCol==='pos'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='level'?'sorted':''}" onclick="onSort('level')">Lv. <i class="sort-icon">${sortCol==='level'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='ret'?'sorted':''}" onclick="onSort('ret')" style="text-align:right">เกษียณ (ค.ศ.) <i class="sort-icon">${sortCol==='ret'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
      </tr></thead>
      <tbody>${data.map((r,i)=>`<tr><td class="row-num">${i+1}</td><td style="color:#e2e8f0">${r.name}</td><td>${posTag(r.pos, r.level)}</td><td>${levelBadge(r.level)}</td><td class="${r.ret<=2029?'retire-soon':''}" style="font-family:var(--mono);font-size:11px;text-align:right">${r.ret}</td></tr>`).join('')}</tbody>
    </table></div>`;
  } else {
    el.innerHTML=`<div class="staff-list"><table class="staff-tbl">
      <thead><tr>
        <th class="row-num">#</th>
        <th class="${sortCol==='name'?'sorted':''}" onclick="onSort('name')">ชื่อ-นามสกุล <i class="sort-icon">${sortCol==='name'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th>ระดับ</th>
        <th class="${sortCol==='course'?'sorted':''}" onclick="onSort('course')">หลักสูตร <i class="sort-icon">${sortCol==='course'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='rating'?'sorted':''}" onclick="onSort('rating')" style="text-align:right">คาดได้ Rating (ค.ศ.) <i class="sort-icon">${sortCol==='rating'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
        <th class="${sortCol==='status'?'sorted':''}" onclick="onSort('status')">สถานะ <i class="sort-icon">${sortCol==='status'?(sortDir===1?'↑':'↓'):'↕'}</i></th>
      </tr></thead>
      <tbody>${data.map((r,i)=>`<tr><td class="row-num">${i+1}</td><td style="color:#e2e8f0">${r.name}</td><td>${lvTag(r.lv)}</td><td style="font-size:11px;color:#94a3b8;">${r.course||'—'}</td><td style="font-family:var(--mono);font-size:11px;color:${r.rating?'#6ee7b7':'#64748b'};text-align:right">${r.rating||'—'}</td><td>${statusTag(r.status)}</td></tr>`).join('')}</tbody>
    </table></div>`;
  }
}

function switchTab(tab) {
  currentTab=tab; sortCol=''; sortDir=1; searchVal=''; filterRet='all';
  document.getElementById('tab-lic').classList.toggle('active',tab==='licensed');
  document.getElementById('tab-stu').classList.toggle('active',tab==='student');
  document.getElementById('searchInput').value='';
  updateFilterBar();
  renderStaffList(DATA.locations.find(l=>l.id===currentLoc));
}
function onSearch(v){searchVal=v;renderStaffList(DATA.locations.find(l=>l.id===currentLoc));}
function onFilterRet(v){filterRet=v;renderStaffList(DATA.locations.find(l=>l.id===currentLoc));}

const GANTT_START=new Date('2024-01-01'), GANTT_END=new Date('2030-01-01');

// ── Course page state ──
let selectedCourse = -1;   // stores COURSES[] original index
let courseFilterSangkad = 'all';

// Sort courses once: earliest rating first, null last
const SORTED_COURSES = [...COURSES].sort((a,b)=>{
  if(!a.rating && !b.rating) return 0;
  if(!a.rating) return 1;
  if(!b.rating) return -1;
  return new Date(a.rating) - new Date(b.rating);
});

// Unique sangkad list for filter
const SANGKAD_LIST = [...new Set(COURSES.map(c=>c.sangkad))].sort();

// ── Build a single course card HTML ──
function buildCourseCard(c, origIdx, isSelected) {
  const sangkadBadge = `<span style="display:inline-block;background:rgba(6,182,212,0.15);color:#67e8f9;border:1px solid rgba(6,182,212,0.3);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:600;font-family:var(--mono)">${c.sangkad}</span>`;
  const selectedStyle = isSelected
    ? 'border-color:var(--blue);background:rgba(59,130,246,0.1);box-shadow:0 0 0 1px var(--blue);'
    : '';
  return `<div class="course-card" id="cc-${origIdx}" data-idx="${origIdx}" onclick="openCourseDetail(${origIdx})" style="${selectedStyle}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
      <div class="cc-code">${c.code} <span style="font-weight:400;color:var(--muted)">Lv.${c.level}</span></div>
      ${sangkadBadge}
    </div>
    <div class="cc-name">${c.name}</div>
    <div class="cc-meta" style="margin-top:8px;">
      <div><div class="cc-count">${c.count}</div><div style="font-size:10px;color:var(--muted)">นักเรียน</div></div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted)">Rating คาดการณ์</div>
        <div style="font-family:var(--mono);font-size:11px;color:${c.rating?'#fcd34d':'#64748b'}">${c.rating?fmtDate(c.rating):'รอ กพท.'}</div>
      </div>
    </div>
    <div class="progress-bar" style="margin-top:10px;">
      <div class="progress-fill" style="width:${c.progress}%;background:#10b981;"></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px;">OJT Progress ~${c.progress}%</div>
  </div>`;
}

// ── Render just the card grid (respects filter + selection) ──
function renderCourseCards() {
  const filtered = SORTED_COURSES.filter(c =>
    courseFilterSangkad === 'all' || c.sangkad === courseFilterSangkad
  );
  const grid = document.getElementById('courseCardGrid');
  if (!grid) return;
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px 0;font-size:12px;">ไม่มีหลักสูตรในสังกัดที่เลือก</div>`;
    return;
  }
  grid.innerHTML = filtered.map(c => {
    const origIdx = COURSES.indexOf(c);
    return buildCourseCard(c, origIdx, origIdx === selectedCourse);
  }).join('');
}

// ── Filter change handler ──
function onCourseFilter(val) {
  courseFilterSangkad = val;
  // If selected card is now hidden, deselect it
  if (selectedCourse !== -1) {
    const c = COURSES[selectedCourse];
    if (val !== 'all' && c.sangkad !== val) {
      selectedCourse = -1;
      // Reset detail panel
      document.getElementById('courseDetailWrap').innerHTML = `
        <div class="detail-panel dp-placeholder"><div style="text-align:center;color:var(--muted);font-size:12px;"><div style="font-size:28px;margin-bottom:8px;opacity:0.3">☝</div>คลิก Course Card<br>เพื่อดูรายละเอียด</div></div>
        <div class="detail-panel dp-placeholder"><div style="text-align:center;color:var(--muted);font-size:12px;">รายชื่อนักเรียนจะแสดงที่นี่</div></div>`;
    }
  }
  renderCourseCards();
}

function renderCoursePage(){
  destroyCharts();
  selectedCourse = -1;
  courseFilterSangkad = 'all';

  const totalStudents = COURSES.reduce((a,b)=>a+b.count, 0);
  const ratingThisYear = COURSES.filter(c=>c.rating&&new Date(c.rating).getFullYear()===2026).reduce((a,b)=>a+b.count, 0);
  const noRating = COURSES.filter(c=>!c.rating).reduce((a,b)=>a+b.count, 0);

  // Gantt rows (sorted)
  const months = [];
  const ms = new Date(GANTT_START);
  while(ms < GANTT_END){
    if(ms.getMonth()%6===0) months.push({label:String(ms.getFullYear()), pct:dayOffset(ms.toISOString().slice(0,10))});
    ms.setMonth(ms.getMonth()+1);
  }
  const monthRow = months.map(m=>`<div style="position:absolute;left:${m.pct}%;top:0;font-size:9px;color:var(--muted);border-left:1px solid var(--border2);padding-left:2px;height:100%">${m.label}</div>`).join('');

  let ganttRows = '';
  SORTED_COURSES.forEach(c=>{
    const th_x=dayOffset(c.theory_start), th_w=dayWidth(c.theory_start,c.theory_end);
    const oj_x=dayOffset(c.ojt_start),   oj_w=dayWidth(c.ojt_start,c.ojt_end);
    const rt_x=dayOffset(c.rating);
    ganttRows+=`<tr>
      <td class="gantt-name-cell" title="${c.name}">${c.code}</td>
      <td class="gantt-count">${c.count}</td>
      <td><div class="gantt-timeline">
        ${th_w>0?`<div class="bar-theory" style="left:${th_x}%;width:${th_w}%" title="Theory: ${fmtDate(c.theory_start)} → ${fmtDate(c.theory_end)}"></div>`:''}
        ${oj_w>0?`<div class="bar-ojt" style="left:${oj_x}%;width:${oj_w}%" title="OJT: ${fmtDate(c.ojt_start)} → ${fmtDate(c.ojt_end)}"></div>`:''}
        ${rt_x?`<div class="rating-dot" style="left:calc(${rt_x}% - 4px)" title="Rating: ${fmtDate(c.rating)}"></div>`:''}
      </div></td>
      <td class="gantt-rating-cell">${c.rating?new Date(c.rating).getFullYear():'—'}</td>
    </tr>`;
  });

  // Sangkad filter options
  const filterOpts = `<option value="all">ทุกสังกัด</option>`
    + SANGKAD_LIST.map(s=>`<option value="${s}">${s}</option>`).join('');

  document.getElementById('page-course').innerHTML=`
    <div class="kpi-row-4" style="margin-bottom:16px;">
      <div class="kpi c-blue"><div class="kpi-label">หลักสูตรทั้งหมด</div><div class="kpi-value">${COURSES.length}</div><div class="kpi-sub">กำลังดำเนินการ</div></div>
      <div class="kpi c-amber"><div class="kpi-label">นักเรียนทั้งหมด</div><div class="kpi-value">${totalStudents}</div><div class="kpi-sub">อยู่ในแผนฝึกอบรม</div></div>
      <div class="kpi c-green"><div class="kpi-label">คาดได้ Rating ปี 2026</div><div class="kpi-value">${ratingThisYear}</div><div class="kpi-sub">ภายในปี 2026</div></div>
      <div class="kpi c-red"><div class="kpi-label">รอหลักสูตร / กพท.</div><div class="kpi-value">${noRating}</div><div class="kpi-sub">ยังไม่มีวันคาดการณ์</div></div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;">
        📋 Course Cards — เรียงตามวันที่คาดจะได้ Rating (เร็วที่สุดก่อน)
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:var(--muted);">สังกัด:</span>
        <select class="filter-sel" onchange="onCourseFilter(this.value)">${filterOpts}</select>
      </div>
    </div>
    <div class="course-grid" id="courseCardGrid"></div>

    <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;margin-top:4px;">
      🔍 รายละเอียดหลักสูตร — คลิก Card ด้านบน
    </div>
    <div class="detail-panel-wrap" id="courseDetailWrap" style="margin-bottom:14px;">
      <div class="detail-panel dp-placeholder"><div style="text-align:center;color:var(--muted);font-size:12px;"><div style="font-size:28px;margin-bottom:8px;opacity:0.3">☝</div>คลิก Course Card<br>เพื่อดูรายละเอียด</div></div>
      <div class="detail-panel dp-placeholder"><div style="text-align:center;color:var(--muted);font-size:12px;">รายชื่อนักเรียนจะแสดงที่นี่</div></div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-title"><div class="card-title-left"><span class="cdot" style="background:var(--blue)"></span>Gantt Timeline — ระยะเวลาหลักสูตร Theory → OJT → Rating</div></div>
      <div class="legend" style="margin-bottom:10px;">
        <div class="legend-item"><div class="ldot" style="background:rgba(59,130,246,0.7)"></div>Theory/Sim</div>
        <div class="legend-item"><div class="ldot" style="background:rgba(16,185,129,0.65)"></div>OJT</div>
        <div class="legend-item"><div class="ldot" style="background:#f59e0b;border-radius:50%;width:7px;height:7px"></div>Rating Date</div>
      </div>
      <div style="overflow-x:auto;">
        <table class="gantt">
          <thead><tr>
            <th style="width:140px;text-align:left">หลักสูตร</th>
            <th style="width:28px;text-align:right">คน</th>
            <th><div style="position:relative;height:14px;">${monthRow}</div></th>
            <th style="width:50px;text-align:right">Rating</th>
          </tr></thead>
          <tbody>${ganttRows}</tbody>
        </table>
      </div>
    </div>
  `;

  // Render cards after DOM is ready
  renderCourseCards();
}

function openCourseDetail(idx){
  // Single selection
  selectedCourse = idx;
  renderCourseCards();

  const c = COURSES[idx];

  // Look up students directly from COURSE_STUDENTS by course code
  const stuData = (COURSE_STUDENTS[c.code] || []);
  const specCount = stuData.filter(s=>s.status && s.status!=='-').length;

  const wrap = document.getElementById('courseDetailWrap');
  wrap.innerHTML = `
    <div class="detail-panel">
      <div style="font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:3px;">${c.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">${c.code} · Level ${c.level} · <span style="background:rgba(6,182,212,0.15);color:#67e8f9;border:1px solid rgba(6,182,212,0.3);border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:10px">${c.sangkad}</span></div>
      <div style="margin-bottom:8px;"><div class="phase-label">📖 Theory / Simulation</div><div class="phase-dates">${fmtDate(c.theory_start)} → ${fmtDate(c.theory_end)}</div><div style="font-size:10px;color:var(--muted)">${durMonths(c.theory_start,c.theory_end)}</div></div>
      <div style="margin-bottom:8px;"><div class="phase-label">🎓 OJT</div><div class="phase-dates">${fmtDate(c.ojt_start)} → ${fmtDate(c.ojt_end)}</div><div style="font-size:10px;color:var(--muted)">${durMonths(c.ojt_start,c.ojt_end)}</div></div>
      <div style="margin-bottom:12px;"><div class="phase-label">⭐ Rating คาดการณ์</div><div class="phase-dates" style="color:${c.rating?'#fcd34d':'#64748b'}">${fmtDate(c.rating)}</div></div>
      <div class="status-grid">
        <div class="status-item"><div class="status-num" style="color:#93c5fd">${c.count}</div><div class="status-lbl">นักเรียนทั้งหมด</div></div>
        <div class="status-item"><div class="status-num" style="color:#fcd34d">${c.progress}%</div><div class="status-lbl">OJT Progress</div></div>
        <div class="status-item"><div class="status-num" style="color:#fca5a5">${specCount}</div><div class="status-lbl">สถานะพิเศษ</div></div>
        <div class="status-item"><div class="status-num" style="color:#6ee7b7">${stuData.length - specCount}</div><div class="status-lbl">ปกติ</div></div>
      </div>
    </div>
    <div class="detail-panel">
      <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;">
        รายชื่อนักเรียน · ${c.code} (${stuData.length} คน)
      </div>
      <div class="staff-list">
        <table class="staff-tbl">
          <thead><tr>
            <th style="width:28px">#</th>
            <th>ชื่อ-นามสกุล</th>
            <th>ระดับ</th>
            <th style="text-align:right">คาดได้ Rating (ค.ศ.)</th>
            <th>สถานะ</th>
          </tr></thead>
          <tbody>
            ${stuData.map((s,i)=>`<tr>
              <td style="color:var(--muted);font-family:var(--mono);font-size:11px;">${i+1}</td>
              <td style="color:#e2e8f0">${s.name}</td>
              <td>${lvTag(s.lv)}</td>
              <td style="font-family:var(--mono);font-size:11px;color:${s.rating?'#6ee7b7':'#64748b'};text-align:right">${s.rating||'—'}</td>
              <td>${statusTag(s.status)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.getElementById('updateBadge').textContent = 'ข้อมูล: ' + DATA.updated;
renderOverview();
</script>
</body>
</html>
